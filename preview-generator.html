<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Generator - पवन</title>
    <style>
        body {
            margin:0;
            background:#0a0a0a;
            display:flex;
            align-items:center;
            justify-content:center;
            min-height:100vh;
            font-family:'Georgia','Times New Roman',serif;
        }
        .preview-card {
            width:1200px;
            height:630px;
            background:radial-gradient(ellipse at 50% 30%, #1a3a2a 0%, #0a1a14 40%, #050505 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            overflow:hidden;
        }
        .orb {
            width:240px;
            height:240px;
            border-radius:50%;
            background:radial-gradient(circle at 40% 35%, #2a4a3a, #0f2a1a 60%, #051008 100%);
            box-shadow:
                0 0 60px rgba(180,220,160,0.3),
                0 0 120px rgba(180,210,140,0.2),
                0 0 200px rgba(160,200,130,0.1),
                inset 0 0 40px rgba(220,230,190,0.08);
            position:absolute;
            top:25%;
            left:50%;
            transform:translate(-50%,0);
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .orb-text {
            font-size:3.5rem;
            letter-spacing:2px;
            color:rgba(240,235,220,0.95);
            text-shadow:0 0 35px rgba(200,220,160,0.7), 0 0 80px rgba(180,200,140,0.3);
            font-weight:300;
            z-index:2;
        }
        .ripple {
            position:absolute;
            top:25%;
            left:50%;
            transform:translate(-50%,0);
            width:240px;
            height:240px;
            border-radius:50%;
            border:1px solid rgba(200,210,160,0.08);
        }
        .ripple:nth-child(2) { width:290px; height:290px; }
        .ripple:nth-child(3) { width:340px; height:340px; border-color:rgba(200,210,160,0.04); }
        .particle {
            position:absolute;
            width:2px;
            height:2px;
            border-radius:50%;
            background:rgba(220,225,180,0.6);
        }
        .text-container {
            position:absolute;
            bottom:18%;
            text-align:center;
            z-index:10;
        }
        .tagline {
            font-size:1rem;
            letter-spacing:10px;
            color:rgba(220,225,200,0.7);
            text-transform:uppercase;
        }
        .mystery-line {
            font-size:0.85rem;
            letter-spacing:5px;
            color:rgba(200,210,180,0.5);
            margin-top:2rem;
            font-style:italic;
        }
        .vignette {
            position:absolute;
            top:0;left:0;width:100%;height:100%;
            background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
            pointer-events:none;
        }
        .instructions {
            position:fixed;
            bottom:20px;
            color:#aaa;
            font-family:sans-serif;
            font-size:14px;
            text-align:center;
        }
    </style>
</head>
<body>
    <div class="preview-card" id="previewCard">
        <div class="orb">
            <span class="orb-text">पवन</span>
        </div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="text-container">
            <div class="tagline">One Breath. One Moment.</div>
            <div class="mystery-line">— peace is now one click away —</div>
        </div>
        <div class="vignette"></div>
    </div>
    <div class="instructions">
        📸 Press Ctrl+Shift+M → Set 1200×630 → Ctrl+Shift+P → "Capture screenshot"<br>
        Save as <strong>preview.png</strong> in your repo root
    </div>
    <script>
        const card = document.getElementById('previewCard');
        for(let i=0; i<20; i++){
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random()*100+'%';
            p.style.top = (55+Math.random()*45)+'%';
            p.style.opacity = (0.15+Math.random()*0.4);
            card.appendChild(p);
        }
    </script>
</body>
</html>
