<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview Generator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #1a1a1a;
        }
        .card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1a3a2a 0%, #0f2a1e 30%, #1a3a2a 60%, #0a1f15 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Georgia', 'Times New Roman', serif;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }
        /* Floating particles */
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(210, 180, 130, 0.5);
        }
        /* Center orb */
        .orb {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 30%, #c8e0d2, #3d6b58 55%, #1a3630);
            box-shadow: 0 0 100px rgba(170, 210, 180, 0.6), 0 0 0 2px rgba(255, 255, 240, 0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
        }
        .orb-glow {
            position: absolute;
            width: 220px;
            height: 220px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 130px rgba(180, 210, 190, 0.7);
            z-index: 1;
        }
        /* Text */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .brand-name {
            font-size: 80px;
            color: #f0ece0;
            letter-spacing: 12px;
            font-weight: 400;
            margin-bottom: 10px;
            text-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .subtitle {
            font-size: 28px;
            color: #c8d8c0;
            letter-spacing: 4px;
            font-weight: 300;
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.4);
            margin-bottom: 6px;
        }
        .tagline {
            font-size: 20px;
            color: #b0b8a0;
            letter-spacing: 2px;
            font-style: italic;
            margin-top: 8px;
            text-shadow: 0 1px 10px rgba(0, 0, 0, 0.3);
        }
        .technique {
            font-size: 22px;
            color: #e8d5a3;
            letter-spacing: 3px;
            font-weight: 600;
            margin-top: 4px;
        }
        /* Corner decoration */
        .corner {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255, 255, 240, 0.1);
            border-radius: 50%;
        }
        .corner-tl { top: -60px; left: -60px; }
        .corner-br { bottom: -60px; right: -60px; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <!-- Particles -->
        <div class="particle" style="width:4px;height:4px;top:15%;left:20%;opacity:0.6;"></div>
        <div class="particle" style="width:3px;height:3px;top:25%;left:75%;opacity:0.5;"></div>
        <div class="particle" style="width:5px;height:5px;top:70%;left:30%;opacity:0.7;"></div>
        <div class="particle" style="width:3px;height:3px;top:60%;left:80%;opacity:0.4;"></div>
        <div class="particle" style="width:4px;height:4px;top:40%;left:15%;opacity:0.55;"></div>
        <div class="particle" style="width:2px;height:2px;top:10%;left:55%;opacity:0.5;"></div>
        <div class="particle" style="width:5px;height:5px;top:80%;left:60%;opacity:0.6;"></div>
        <div class="particle" style="width:3px;height:3px;top:45%;left:85%;opacity:0.45;"></div>
        <div class="particle" style="width:4px;height:4px;top:20%;left:45%;opacity:0.5;"></div>
        <div class="particle" style="width:2px;height:2px;top:55%;left:10%;opacity:0.4;"></div>

        <!-- Glow ring -->
        <div class="orb-glow"></div>
        <!-- Center orb -->
        <div class="orb"></div>

        <!-- Decorative corners -->
        <div class="corner corner-tl"></div>
        <div class="corner corner-br"></div>

        <!-- Text content -->
        <div class="content">
            <div class="brand-name">पवन</div>
            <div class="subtitle">Pawan</div>
            <div class="technique">5-7-8 श्वास · Breathing Guide</div>
            <div class="tagline">एक लिंक। एक साँस। शांति।</div>
        </div>
    </div>
</body>
</html>
